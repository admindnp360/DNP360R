<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DNP 360 - Sign In</title>
<!-- Tailwind CSS v3 CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter for clean UI typography -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-base-styles">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #031331; /* Deep dark blue background */
    }
    
    /* Subtle background architectural illustration effect */
    .bg-illustration {
  display: none;
}

    /* Custom shadow for the sign-in card */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
<style data-purpose="form-elements">
    /* Custom focus states for inputs */
    .input-field:focus-within {
      border-color: #2563eb;
      box-shadow: 0 0 0 1px #2563eb;
    }
    
    /* Tab active indicator logic simulator */
    .tab-active {
      background-color: #1d4ed8;
      color: white;
    }
    .tab-inactive {
      background-color: transparent;
      color: #94a3b8;
    }
    
    .method-active {
      background-color: #1d4ed8;
      color: white;
    }
    .method-inactive {
      background-color: transparent;
      color: #94a3b8;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-white relative overflow-hidden">
<!-- BEGIN: Background Overlay -->
<div class="absolute inset-0 bg-illustration z-0"></div>
<!-- END: Background Overlay -->
<!-- BEGIN: Main Container -->
<main class="relative z-10 w-full max-w-md flex flex-col items-center">
<!-- BEGIN: Header Section -->
<header class="text-center mb-8" data-purpose="app-branding">
<div class="inline-flex items-center space-x-1 bg-[#0a1e45] border-2 border-blue-600/50 rounded-xl px-4 py-2 mb-4">
<span class="text-3xl font-bold tracking-tight">DNP</span>
<span class="text-3xl font-bold bg-[#f97316] px-2 rounded-md">360</span>
</div>
<h1 class="text-xl font-semibold">Nagar Parishad Daudnagar</h1>
<p class="text-slate-400 text-sm mt-1">Citizen Services Platform</p>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Sign In Card -->
<section class="w-full glass-card rounded-3xl p-6 md:p-8" data-purpose="sign-in-form-container">
<div class="text-center mb-6">
<h2 class="text-lg font-semibold" id="welcome-text">Welcome Back 👋</h2>
<p class="text-xs text-slate-400 mt-1" id="welcome-subtext">Please sign in to continue</p>
</div>
<!-- BEGIN: Primary Tabs (Sign In / Secret Code) -->
<div class="flex bg-[#0a1e45]/50 border border-slate-700 rounded-xl p-1 mb-6" data-purpose="auth-method-tabs">
<button class="flex-1 flex items-center justify-center space-x-2 py-2.5 rounded-lg tab-active transition-all active:scale-[0.98]" id="tab-signin">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-sm font-medium">Sign In</span>
</button>
<button class="flex-1 flex items-center justify-center space-x-2 py-2.5 rounded-lg tab-inactive hover:text-slate-200 transition-all active:scale-[0.98]" id="tab-secret">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-sm font-medium">Secret Code</span>
</button>
</div>
<!-- END: Primary Tabs -->
<div id="signin-methods-container">
<!-- Divider with text -->
<div class="relative flex items-center my-6">
<div class="flex-grow border-t border-slate-700"></div>
<span class="flex-shrink mx-4 text-[10px] text-slate-500 uppercase tracking-widest">Sign In with</span>
<div class="flex-grow border-t border-slate-700"></div>
</div>
<!-- BEGIN: Secondary Tabs (Mobile / Email) -->
<div class="flex border border-slate-700 rounded-xl overflow-hidden mb-6" data-purpose="credential-type-tabs">
<button class="flex-1 flex items-center justify-center space-x-2 py-3 method-active transition-colors active:opacity-90" id="tab-mobile">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-sm">Mobile Number</span>
</button>
<button class="flex-1 flex items-center justify-center space-x-2 py-3 method-inactive hover:bg-white/5 transition-colors active:opacity-90" id="tab-email">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-sm">E-mail</span>
</button>
</div>
<!-- END: Secondary Tabs -->
</div>
<div class="hidden" id="secret-code-container">
<div class="relative flex items-center my-6">
<div class="flex-grow border-t border-slate-700"></div>
<span class="flex-shrink mx-4 text-[10px] text-slate-500 uppercase tracking-widest">Security</span>
<div class="flex-grow border-t border-slate-700"></div>
</div>
</div>
<!-- BEGIN: Input Fields -->
<form class="space-y-4" data-purpose="login-form">
<div class="input-field flex items-center border border-slate-700 rounded-xl px-4 py-3 bg-[#0a1e45]/30 focus-within:ring-2 focus-within:ring-blue-500 transition-all" id="identifier-input-container">
<span id="identifier-icon-container">
<svg class="w-5 h-5 text-slate-500 mr-3" fill="none" id="icon-mobile" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<svg class="w-5 h-5 text-slate-500 mr-3 hidden" fill="none" id="icon-email" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<svg class="w-5 h-5 text-slate-500 mr-3 hidden" fill="none" id="icon-code" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-white placeholder-slate-500 text-sm" id="main-input" placeholder="Enter Mobile Number" type="tel"/>
</div>
<div class="input-field flex items-center border border-slate-700 rounded-xl px-4 py-3 bg-[#0a1e45]/30 focus-within:ring-2 focus-within:ring-blue-500 transition-all" id="password-input-container">
<svg class="w-5 h-5 text-slate-500 mr-3" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<input class="bg-transparent border-none focus:ring-0 w-full text-white placeholder-slate-500 text-sm" id="password-field" placeholder="Enter Password" type="password"/>
<button class="ml-2 text-slate-500 hover:text-slate-300 transition-colors focus:outline-none" id="toggle-password" type="button">
<svg class="w-5 h-5" fill="none" id="eye-icon" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
<div class="flex justify-end" id="forgot-link-container">
<a class="text-xs text-blue-500 hover:text-blue-400 font-medium transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-blue-900/20 active:transform active:scale-[0.98] transition-all" id="submit-btn" type="submit">
          Sign In
        </button>
</form>
<!-- END: Input Fields -->
<div id="social-container">
<!-- Divider with text -->
<div class="relative flex items-center my-6">
<div class="flex-grow border-t border-slate-700"></div>
<span class="flex-shrink mx-4 text-[10px] text-slate-500 uppercase tracking-widest">OR</span>
<div class="flex-grow border-t border-slate-700"></div>
</div>
<!-- BEGIN: Social Sign In -->
<a class="w-full flex items-center justify-center space-x-3 border border-slate-700 bg-transparent hover:bg-white/5 py-3.5 rounded-xl transition-all active:scale-[0.98] active:bg-white/10" data-purpose="google-signin" href="https://accounts.google.com"><svg class="w-5 h-5" viewbox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg><span class="text-sm font-medium">Continue with Google</span></a>
<p class="text-center text-[10px] text-slate-500 mt-4">Google Sign In for Citizens Only</p>
<div class="mt-6 text-center"><p class="text-xs text-slate-400">Don't have an account? <a class="text-blue-500 hover:text-blue-400 font-medium transition-colors" href="#">Sign Up</a></p></div></div>
<!-- END: Social Sign In -->
</section>
<!-- END: Sign In Card -->
<!-- BEGIN: Footer Features -->
<footer class="w-full flex justify-between items-center mt-10 px-4 mb-8" data-purpose="app-features">
<div class="flex flex-col items-center space-y-1">
<div class="w-10 h-10 rounded-full border border-blue-500/30 flex items-center justify-center bg-blue-900/20">
<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<span class="text-[10px] text-slate-400 font-medium">Secure</span>
</div>
<div class="flex flex-col items-center space-y-1">
<div class="w-10 h-10 rounded-full border border-blue-500/30 flex items-center justify-center bg-blue-900/20">
<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<span class="text-[10px] text-slate-400 font-medium">Fast</span>
</div>
<div class="flex flex-col items-center space-y-1">
<div class="w-10 h-10 rounded-full border border-blue-500/30 flex items-center justify-center bg-blue-900/20">
<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<span class="text-[10px] text-slate-400 font-medium">Reliable</span>
</div>
<div class="flex flex-col items-center space-y-1">
<div class="w-10 h-10 rounded-full border border-blue-500/30 flex items-center justify-center bg-blue-900/20">
<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<span class="text-[10px] text-slate-400 font-medium">Trusted</span>
</div>
</footer>
<!-- END: Footer Features -->
</main>
<!-- END: Main Container -->
<script data-purpose="app-logic">
    // DOM Elements
    const btnSignIn = document.getElementById('tab-signin');
    const btnSecret = document.getElementById('tab-secret');
    const btnMobile = document.getElementById('tab-mobile');
    const btnEmail = document.getElementById('tab-email');
    
    const welcomeText = document.getElementById('welcome-text');
    const welcomeSubtext = document.getElementById('welcome-subtext');
    const methodsContainer = document.getElementById('signin-methods-container');
    const secretCodeContainer = document.getElementById('secret-code-container');
    const socialContainer = document.getElementById('social-container');
    
    const mainInput = document.getElementById('main-input');
    const passwordContainer = document.getElementById('password-input-container');
    const forgotLinkContainer = document.getElementById('forgot-link-container');
    const submitBtn = document.getElementById('submit-btn');
    
    const iconMobile = document.getElementById('icon-mobile');
    const iconEmail = document.getElementById('icon-email');
    const iconCode = document.getElementById('icon-code');
    
    const passwordField = document.getElementById('password-field');
    const togglePassword = document.getElementById('toggle-password');
    const eyeIcon = document.getElementById('eye-icon');

    // State
    let currentAuthType = 'signin'; // 'signin' or 'secret'
    let currentMethod = 'mobile'; // 'mobile' or 'email'

    // Tab Switching Logic (Primary)
    btnSignIn.addEventListener('click', () => {
      currentAuthType = 'signin';
      btnSignIn.classList.replace('tab-inactive', 'tab-active');
      btnSecret.classList.replace('tab-active', 'tab-inactive');
      
      welcomeText.textContent = "Welcome Back 👋";
      welcomeSubtext.textContent = "Please sign in to continue";
      methodsContainer.classList.remove('hidden');
      secretCodeContainer.classList.add('hidden');
      socialContainer.classList.remove('hidden');
      
      passwordContainer.classList.remove('hidden');
      forgotLinkContainer.classList.remove('hidden');
      submitBtn.textContent = "Sign In";
      
      // Restore appropriate placeholder
      updateInputPlaceholder();
    });

    btnSecret.addEventListener('click', () => {
      currentAuthType = 'secret';
      btnSecret.classList.replace('tab-inactive', 'tab-active');
      btnSignIn.classList.replace('tab-active', 'tab-inactive');
      
      welcomeText.textContent = "Secret Code 🛡️";
      welcomeSubtext.textContent = "Access with your unique security code";
      methodsContainer.classList.add('hidden');
      secretCodeContainer.classList.remove('hidden');
      socialContainer.classList.add('hidden');
      
      passwordContainer.classList.add('hidden');
      forgotLinkContainer.classList.add('hidden');
      submitBtn.textContent = "Verify Code";
      
      mainInput.placeholder = "Enter 6-Digit Secret Code";
      mainInput.type = "text";
      
      iconMobile.classList.add('hidden');
      iconEmail.classList.add('hidden');
      iconCode.classList.remove('hidden');
    });

    // Method Switching Logic (Secondary)
    btnMobile.addEventListener('click', () => {
      currentMethod = 'mobile';
      btnMobile.classList.add('method-active');
      btnMobile.classList.remove('method-inactive');
      btnEmail.classList.add('method-inactive');
      btnEmail.classList.remove('method-active');
      updateInputPlaceholder();
    });

    btnEmail.addEventListener('click', () => {
      currentMethod = 'email';
      btnEmail.classList.add('method-active');
      btnEmail.classList.remove('method-inactive');
      btnMobile.classList.add('method-inactive');
      btnMobile.classList.remove('method-active');
      updateInputPlaceholder();
    });

    function updateInputPlaceholder() {
      if (currentAuthType === 'signin') {
        iconCode.classList.add('hidden');
        if (currentMethod === 'mobile') {
          mainInput.placeholder = "Enter Mobile Number";
          mainInput.type = "tel";
          iconMobile.classList.remove('hidden');
          iconEmail.classList.add('hidden');
        } else {
          mainInput.placeholder = "Enter E-mail Address";
          mainInput.type = "email";
          iconMobile.classList.add('hidden');
          iconEmail.classList.remove('hidden');
        }
      }
    }

    // Password Visibility Toggle
    togglePassword.addEventListener('click', () => {
      const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordField.setAttribute('type', type);
      
      // Update eye icon state (simple toggle)
      if (type === 'text') {
        eyeIcon.classList.add('text-blue-500');
        eyeIcon.innerHTML = `<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>`;
      } else {
        eyeIcon.classList.remove('text-blue-500');
        eyeIcon.innerHTML = `<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>`;
      }
    });
  </script>
</body></html>
